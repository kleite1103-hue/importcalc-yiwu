<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0c0f">
<title>Ponte · PT ⇄ 中文</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.js"></script>
<style>
  :root{
    --bg:#0b0c0f; --panel:#15171c; --panel2:#1c1f26; --line:#2a2e38;
    --txt:#f4f5f7; --dim:#8b919e; --faint:#5b616e;
    --pt:#ff4d1c;       /* Brasil */
    --zh:#19c39c;       /* Jade */
    --pt-soft:rgba(255,77,28,.14);
    --zh-soft:rgba(25,195,156,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:'Space Grotesk',system-ui,sans-serif;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  .cjk{font-family:'Space Grotesk','PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans CJK SC',sans-serif;}
  .mono{font-family:'DM Mono',ui-monospace,monospace;}

  /* ---------- Topo ---------- */
  header{
    padding:14px 18px 12px; display:flex; align-items:center; gap:12px;
    border-bottom:1px solid var(--line);
  }
  .brand{font-weight:700; font-size:15px; letter-spacing:.02em; flex:1;}
  .brand b{color:var(--pt);} .brand span{color:var(--zh);}
  .dirbar{
    display:flex; align-items:center; gap:10px;
    padding:14px 18px; border-bottom:1px solid var(--line); background:var(--panel);
  }
  .lang{
    flex:1; text-align:center; padding:10px 0; border-radius:12px;
    font-weight:600; font-size:15px; border:1px solid var(--line); background:var(--panel2);
    transition:.18s;
  }
  .lang small{display:block; font-size:11px; font-weight:400; color:var(--dim); margin-top:2px; letter-spacing:.04em;}
  .src.pt{border-color:var(--pt); background:var(--pt-soft); color:#fff;}
  .src.zh{border-color:var(--zh); background:var(--zh-soft); color:#fff;}
  .src.pt small,.src.zh small{color:rgba(255,255,255,.75);}
  #swap{
    width:46px; height:46px; flex:none; border-radius:50%;
    border:1px solid var(--line); background:var(--panel2); color:var(--txt);
    font-size:19px; cursor:pointer; transition:transform .35s;
  }
  #swap:active{transform:rotate(180deg) scale(.92);}

  /* ---------- Histórico ---------- */
  #feed{flex:1; overflow-y:auto; padding:16px 16px 8px; display:flex; flex-direction:column; gap:14px;}
  #feed::-webkit-scrollbar{width:0;}
  .empty{margin:auto; text-align:center; color:var(--faint); max-width:280px;}
  .empty .big{font-size:46px; margin-bottom:6px;}
  .empty p{font-size:14px; line-height:1.5;}

  .card{
    border:1px solid var(--line); border-radius:16px; overflow:hidden;
    background:var(--panel); animation:rise .25s ease;
  }
  @keyframes rise{from{opacity:0; transform:translateY(8px);}to{opacity:1;}}
  .card .from{padding:11px 15px 9px; font-size:14px; color:var(--dim); border-bottom:1px solid var(--line);}
  .card .from b{color:var(--txt); font-weight:500;}
  .card .to{padding:14px 15px 13px; display:flex; gap:12px; align-items:flex-start;}
  .card .to .main{flex:1; min-width:0;}
  .card .to .big{font-size:24px; line-height:1.3; font-weight:600; word-wrap:break-word;}
  .card.r-pt .big{color:var(--pt);} .card.r-zh .big{color:var(--zh);}
  .card .pinyin{margin-top:6px; font-size:14px; color:var(--dim);}
  .play{
    flex:none; width:42px; height:42px; border-radius:11px; border:1px solid var(--line);
    background:var(--panel2); color:var(--txt); font-size:17px; cursor:pointer;
  }
  .play:active{background:#262a33;}
  .card.r-pt .play{border-color:rgba(255,77,28,.4);}
  .card.r-zh .play{border-color:rgba(25,195,156,.4);}

  /* ---------- Frases rápidas ---------- */
  .quick{padding:4px 16px 0; flex:none;}
  .quick .qlabel{font-size:11px; color:var(--faint); letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px;}
  .qrow{display:flex; gap:8px; overflow-x:auto; padding-bottom:10px;}
  .qrow::-webkit-scrollbar{height:0;}
  .chip{
    flex:none; padding:9px 13px; border-radius:11px; border:1px solid var(--line);
    background:var(--panel); color:var(--txt); font-size:13px; white-space:nowrap; cursor:pointer;
  }
  .chip:active{background:var(--zh-soft); border-color:var(--zh);}

  /* ---------- Base ---------- */
  .dock{padding:12px 16px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:var(--panel);}
  .interim{min-height:18px; font-size:13px; color:var(--dim); text-align:center; margin-bottom:8px; transition:.15s;}
  .miclane{display:flex; align-items:center; gap:12px;}
  #typeBtn{
    width:50px; height:50px; flex:none; border-radius:14px; border:1px solid var(--line);
    background:var(--panel2); color:var(--txt); font-size:19px; cursor:pointer;
  }
  #mic{
    flex:1; height:62px; border-radius:16px; border:none; cursor:pointer;
    font-family:inherit; font-weight:700; font-size:16px; letter-spacing:.02em;
    color:#0b0c0f; display:flex; align-items:center; justify-content:center; gap:9px;
    background:var(--pt); transition:.18s;
  }
  #mic.zh{background:var(--zh);}
  #mic.listening{animation:pulse 1.1s infinite;}
  @keyframes pulse{0%,100%{filter:brightness(1);box-shadow:0 0 0 0 rgba(255,255,255,.0);}50%{filter:brightness(1.12);box-shadow:0 0 0 10px rgba(255,255,255,.06);}}
  #mic .dot{width:10px;height:10px;border-radius:50%;background:#0b0c0f;}
  #mic.listening .dot{animation:blink .7s infinite;}
  @keyframes blink{50%{opacity:.25;}}

  /* entrada de texto (fallback) */
  .typebox{display:none; gap:8px; margin-top:10px;}
  .typebox.on{display:flex;}
  #txtIn{
    flex:1; height:50px; border-radius:13px; border:1px solid var(--line);
    background:var(--bg); color:var(--txt); padding:0 14px; font-size:15px; font-family:inherit;
  }
  #txtIn:focus{outline:none; border-color:var(--zh);}
  #sendBtn{height:50px; padding:0 18px; border-radius:13px; border:none; background:var(--zh); color:#0b0c0f; font-weight:700; font-size:15px; cursor:pointer;}

  .warn{margin:10px 16px 0; padding:11px 14px; border-radius:12px; background:rgba(255,77,28,.1); border:1px solid rgba(255,77,28,.35); font-size:13px; line-height:1.45; color:#ffd2c4; display:none;}
  .warn.show{display:block;}
</style>
</head>
<body>

<header>
  <div class="brand">Ponte <b>PT</b> ⇄ <span>中文</span></div>
  <div class="mono" style="font-size:12px;color:var(--faint)">Yiwu · Efeito Vendas</div>
</header>

<div class="dirbar">
  <div class="lang src pt" id="lblSrc">Português<small>você fala</small></div>
  <button id="swap" title="Inverter">⇄</button>
  <div class="lang dst zh" id="lblDst">中文<small>tradução</small></div>
</div>

<div class="warn" id="warn"></div>

<div id="feed">
  <div class="empty" id="empty">
    <div class="big">🎙️→ 中</div>
    <p>Toque no microfone e fale. A tradução aparece, toca em voz alta e mostra o pinyin pra você repetir.</p>
  </div>
</div>

<div class="quick">
  <div class="qlabel">Frases de negociação (toque pra falar em chinês)</div>
  <div class="qrow" id="qrow"></div>
</div>

<div class="dock">
  <div class="interim" id="interim"></div>
  <div class="miclane">
    <button id="typeBtn" title="Digitar">⌨</button>
    <button id="mic"><span class="dot"></span><span id="micTxt">Falar em português</span></button>
  </div>
  <div class="typebox" id="typebox">
    <input id="txtIn" placeholder="Digite e traduza…" autocomplete="off">
    <button id="sendBtn">→</button>
  </div>
</div>

<script>
(() => {
  // ---------- Frases pré-carregadas (funcionam offline / sinal ruim) ----------
  const PHRASES = [
    {pt:"Quanto custa este produto?",            zh:"这个产品多少钱？"},
    {pt:"Qual a quantidade mínima (MOQ)?",       zh:"最小起订量是多少？"},
    {pt:"Pode me enviar uma amostra?",           zh:"可以给我寄个样品吗？"},
    {pt:"Qual o prazo de produção?",             zh:"生产周期是多久？"},
    {pt:"Tem desconto para pedido grande?",      zh:"大批量订购有折扣吗？"},
    {pt:"Pode colocar a minha marca? (OEM)",     zh:"可以贴我的牌子吗？"},
    {pt:"Peso e tamanho da caixa?",              zh:"一箱的重量和尺寸是多少？"},
    {pt:"Pode enviar ao meu agente de carga?",   zh:"可以发给我的货代吗？"},
    {pt:"Aceita pagamento por transferência?",   zh:"可以银行转账付款吗？"},
    {pt:"Pode entregar mais rápido?",            zh:"可以快一点交货吗？"}
  ];

  // ---------- Estado ----------
  let dir = 'pt2zh'; // ou 'zh2pt'
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const synth = window.speechSynthesis;
  let voices = [];
  const loadVoices = () => { voices = synth.getVoices(); };
  loadVoices(); if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

  const $ = id => document.getElementById(id);
  const feed = $('feed'), empty = $('empty'), interim = $('interim');

  // ---------- Pinyin (defensivo) ----------
  function toPinyin(zh){
    try { if (window.pinyinPro) return window.pinyinPro.pinyin(zh, {toneType:'symbol'}); }
    catch(e){}
    return '';
  }

  // ---------- Voz (TTS) ----------
  function pickVoice(langPrefix){
    return voices.find(v => v.lang && v.lang.toLowerCase().startsWith(langPrefix)) || null;
  }
  function speak(text, lang){ // lang: 'zh' | 'pt'
    if (!synth) return;
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang === 'zh' ? 'zh-CN' : 'pt-BR';
    const v = pickVoice(lang === 'zh' ? 'zh' : 'pt'); if (v) u.voice = v;
    u.rate = lang === 'zh' ? 0.92 : 1;
    synth.speak(u);
  }

  // ---------- Tradução (MyMemory, sem chave) ----------
  async function translate(text, from, to){
    const pair = (from==='pt'?'pt':'zh-CN') + '|' + (to==='pt'?'pt':'zh-CN');
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${pair}&de=kleite1103@gmail.com`;
    const r = await fetch(url);
    const d = await r.json();
    let out = d?.responseData?.translatedText || '';
    if (/MYMEMORY WARNING|INVALID/i.test(out)) {
      // fallback: tenta achar a melhor 'match'
      const m = (d.matches||[]).filter(x=>x.translation && !/WARNING/i.test(x.translation));
      if (m.length) out = m[0].translation;
    }
    return out.trim();
  }

  // ---------- Render de um par no feed ----------
  function addCard(srcText, srcLang, dstText, dstLang){
    if (empty.parentNode) empty.remove();
    const card = document.createElement('div');
    card.className = 'card ' + (dstLang==='pt' ? 'r-pt' : 'r-zh');
    const pin = dstLang==='zh' ? toPinyin(dstText) : (srcLang==='zh' ? toPinyin(srcText) : '');
    card.innerHTML = `
      <div class="from"><b>${srcLang==='zh'?'🇨🇳':'🇧🇷'}</b> <span class="${srcLang==='zh'?'cjk':''}">${escapeHtml(srcText)}</span></div>
      <div class="to">
        <div class="main">
          <div class="big ${dstLang==='zh'?'cjk':''}">${escapeHtml(dstText)}</div>
          ${pin ? `<div class="pinyin mono">${escapeHtml(pin)}</div>` : ''}
        </div>
        <button class="play">▶</button>
      </div>`;
    card.querySelector('.play').onclick = () => speak(dstText, dstLang);
    feed.appendChild(card);
    feed.scrollTop = feed.scrollHeight;
    speak(dstText, dstLang); // fala automático
  }
  function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  // ---------- Pipeline principal ----------
  async function handleInput(text){
    text = (text||'').trim(); if (!text) return;
    const from = dir==='pt2zh' ? 'pt' : 'zh';
    const to   = dir==='pt2zh' ? 'zh' : 'pt';
    interim.textContent = 'traduzindo…';
    try{
      const out = await translate(text, from, to);
      interim.textContent = '';
      if (!out){ interim.textContent = 'não consegui traduzir, tente de novo'; return; }
      addCard(text, from, out, to);
    }catch(e){
      interim.textContent = 'sem conexão com o tradutor — verifique a internet';
    }
  }

  // ---------- Direção / swap ----------
  function applyDir(){
    const pt2zh = dir==='pt2zh';
    $('lblSrc').className = 'lang src ' + (pt2zh?'pt':'zh');
    $('lblDst').className = 'lang dst ' + (pt2zh?'zh':'pt');
    $('lblSrc').innerHTML = pt2zh ? 'Português<small>você fala</small>' : '中文<small>你说</small>';
    $('lblDst').innerHTML = pt2zh ? '中文<small>tradução</small>' : 'Português<small>tradução</small>';
    const mic = $('mic');
    mic.classList.toggle('zh', !pt2zh);
    $('micTxt').textContent = pt2zh ? 'Falar em português' : '说中文 · Falar em chinês';
    $('txtIn').placeholder = pt2zh ? 'Digite em português…' : '输入中文… / Digite em chinês';
  }
  $('swap').onclick = () => { dir = dir==='pt2zh' ? 'zh2pt' : 'pt2zh'; applyDir(); };

  // ---------- Reconhecimento de fala ----------
  let rec = null, listening = false;
  function startListen(){
    if (!SR){ return; }
    if (listening){ rec && rec.stop(); return; }
    rec = new SR();
    rec.lang = dir==='pt2zh' ? 'pt-BR' : 'zh-CN';
    rec.interimResults = true;
    rec.continuous = false;
    rec.onstart = () => { listening = true; $('mic').classList.add('listening'); $('micTxt').textContent = 'Ouvindo… toque pra parar'; };
    rec.onresult = (ev) => {
      let txt = '';
      for (let i=ev.resultIndex; i<ev.results.length; i++) txt += ev.results[i][0].transcript;
      interim.textContent = txt;
      if (ev.results[ev.results.length-1].isFinal){ handleInput(txt); }
    };
    rec.onerror = (e) => {
      if (e.error === 'not-allowed') showWarn('Microfone bloqueado. Libere a permissão do microfone para este site (cadeado na barra) ou use o teclado ⌨.');
      else if (e.error === 'no-speech') interim.textContent = 'não ouvi nada, tente de novo';
    };
    rec.onend = () => { listening = false; $('mic').classList.remove('listening'); applyDir(); };
    try{ rec.start(); }catch(e){}
  }
  $('mic').onclick = startListen;

  // ---------- Teclado (fallback) ----------
  $('typeBtn').onclick = () => { const b=$('typebox'); b.classList.toggle('on'); if(b.classList.contains('on')) $('txtIn').focus(); };
  $('sendBtn').onclick = () => { handleInput($('txtIn').value); $('txtIn').value=''; };
  $('txtIn').addEventListener('keydown', e => { if(e.key==='Enter'){ handleInput($('txtIn').value); $('txtIn').value=''; }});

  // ---------- Frases rápidas ----------
  const qrow = $('qrow');
  PHRASES.forEach(p => {
    const c = document.createElement('button');
    c.className = 'chip';
    c.textContent = p.pt;
    c.onclick = () => addCard(p.pt, 'pt', p.zh, 'zh');
    qrow.appendChild(c);
  });

  // ---------- Avisos / compatibilidade ----------
  function showWarn(msg){ const w=$('warn'); w.textContent = msg; w.classList.add('show'); }
  if (!SR){
    showWarn('Seu navegador não reconhece voz (comum no iPhone/Safari). Use o teclado ⌨ pra digitar — a tradução, o pinyin e a voz funcionam normal. Pra voz por microfone, use o Chrome no Android ou no computador.');
    $('mic').style.opacity = .5;
  }

  applyDir();
})();
</script>
</body>
</html>
